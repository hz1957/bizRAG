model_name_or_path: BAAI/bge-large-zh-v1.5
corpus_path: runtime/phase5/chunks.jsonl
embedding_path: runtime/phase5/embeddings.npy
collection_name: bizrag_default

backend: sentence_transformers
backend_configs:
  sentence_transformers:
    trust_remote_code: true
    sentence_transformers_encode:
      normalize_embeddings: false
      encode_chunk_size: 128
      q_prompt_name: query
      psg_prompt_name: document
      psg_task: null
      q_task: null

index_backend: milvus
index_backend_configs:
  milvus:
    uri: http://milvus:19530
    token: null
    id_field_name: id
    vector_field_name: vector
    text_field_name: contents
    id_max_length: 128
    text_max_length: 60000
    metric_type: IP
    index_params:
      index_type: AUTOINDEX
      metric_type: IP
    search_params:
      metric_type: IP
      params: {}
    index_chunk_size: 1000

batch_size: 8
top_k: 5
gpu_ids: null
query_instruction: ""
is_multimodal: false
overwrite: true
retrieve_thread_num: 1
retriever_url: http://bizrag:64501
is_demo: false
