servers:
  benchmark: bizrag/servers/benchmark
  dense: bizrag/servers/retriever
  sparse: bizrag/servers/retriever
  reranker: bizrag/servers/reranker
  custom: bizrag/servers/custom
  prompt_builder: bizrag/servers/prompt
  generation: bizrag/servers/generation
  evaluation: bizrag/servers/evaluation

pipeline:
- benchmark.get_data
- dense.retriever_init
- sparse.retriever_init
- dense.retriever_search_structured:
    input:
      query_list: q_ls
    output:
      ret_items: ret_items
- sparse.bm25_search_structured:
    input:
      query_list: q_ls
    output:
      ret_items: temp_items
- custom.merge_retrieve_items:
    input:
      ret_items: ret_items
      temp_items: temp_items
      top_k: $top_k
      strategy: $strategy
      rrf_k: $rrf_k
      primary_weight: $primary_weight
      secondary_weight: $secondary_weight
- reranker.reranker_init
- reranker.reranker_rerank_items:
    input:
      query_list: q_ls
      ret_items: ret_items
      top_k: $top_k
      query_instruction: $query_instruction
- custom.retrieve_items_to_passages:
    input:
      ret_items: ret_items
- prompt_builder.qa_rag_boxed:
    input:
      q_ls: q_ls
      ret_psg: ret_psg
      template: $template
- generation.generation_init
- generation.generate:
    input:
      prompt_ls: prompt_ls
      system_prompt: $system_prompt
- custom.output_extract_from_boxed
- evaluation.evaluate:
    input:
      pred_ls: pred_ls
      gt_ls: gt_ls
