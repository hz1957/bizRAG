servers:
  custom: bizrag/servers/custom
  dense: bizrag/servers/retriever
  sparse: bizrag/servers/retriever
  reranker: bizrag/servers/reranker
  prompt_builder: bizrag/servers/prompt
  generation: bizrag/servers/generation

pipeline:
- custom.build_classic_read_inputs
- dense.retriever_init
- sparse.retriever_init
- dense.retriever_search_structured:
    output:
      ret_items: ret_items
- sparse.bm25_search_structured:
    output:
      ret_items: temp_items
- custom.merge_retrieve_items:
    input:
      ret_items: ret_items
      temp_items: temp_items
- reranker.reranker_init
- reranker.reranker_rerank_items
- custom.retrieve_items_to_passages
- prompt_builder.qa_rag
- generation.generation_init
- generation.generate
