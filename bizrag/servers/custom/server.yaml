parameter: bizrag/servers/custom/parameter.yaml
path: bizrag/servers/custom/custom.py
tools:
  build_classic_read_inputs:
    input:
      query: $query
      top_k: $top_k
      query_instruction: $query_instruction
      filters: $filters
      output_fields: $output_fields
      retriever_top_k: $retriever_top_k
      retriever_query_instruction: $retriever_query_instruction
    output:
    - query_list
    - q_ls
    - retrieval_top_k
    - reranker_top_k
    - merge_top_k
    - query_instruction
    - filters
    - output_fields
  merge_retrieve_items:
    input:
      ret_items: $ret_items
      temp_items: $temp_items
      top_k: $merge_top_k
      strategy: $strategy
      rrf_k: $rrf_k
      primary_weight: $primary_weight
      secondary_weight: $secondary_weight
    output:
    - ret_items
  retrieve_items_to_passages:
    input:
      ret_items: $ret_items
    output:
    - ret_psg
  output_extract_from_boxed:
    input:
      ans_ls: $ans_ls
    output:
    - pred_ls
