parameter: bizrag/servers/evaluation/parameter.yaml
path: bizrag/servers/evaluation/evaluation.py
tools:
  evaluate:
    input:
      pred_ls: null
      gt_ls: null
      metrics: $metrics
      save_path: $save_path
    output:
    - eval_res
  evaluate_trec:
    input:
      run_path: $run_path
      qrels_path: $qrels_path
      metrics: $ir_metrics
      ks: $ks
      save_path: $save_path
    output:
    - eval_res
  evaluate_trec_pvalue:
    input:
      run_new_path: $run_new_path
      run_old_path: $run_old_path
      qrels_path: $qrels_path
      metrics: $ir_metrics
      ks: $ks
      n_resamples: $n_resamples
      save_path: $save_path
    output:
    - eval_res
  evaluate_structured:
    input:
      pred_struct_ls: $pred_struct_ls
      gt_struct_ls: $gt_struct_ls
      pred_citations_ls: $pred_citations_ls
      gt_citations_ls: $gt_citations_ls
      save_path: $save_path
    output:
    - eval_res
