parameter: bizrag/servers/retriever/parameter.yaml
path: bizrag/servers/retriever/retriever.py
tools:
  retriever_init:
    input:
      model_name_or_path: $model_name_or_path
      backend_configs: $backend_configs
      batch_size: $batch_size
      corpus_path: $corpus_path
      gpu_ids: $gpu_ids
      is_multimodal: $is_multimodal
      backend: $backend
      index_backend: $index_backend
      index_backend_configs: $index_backend_configs
      is_demo: $is_demo
      collection_name: $collection_name
  retriever_index:
    input:
      embedding_path: $embedding_path
      overwrite: $overwrite
      collection_name: $collection_name
      corpus_path: $corpus_path
  retriever_embed:
    input:
      embedding_path: $embedding_path
      overwrite: $overwrite
      is_multimodal: $is_multimodal
  retriever_delete:
    input:
      collection_name: $collection_name
      filter_expr: $filter_expr
    output:
    - deleted_count
  retriever_drop_collection:
    input:
      collection_name: $collection_name
  retriever_search:
    input:
      query_list: null
      top_k: $top_k
      query_instruction: $query_instruction
      collection_name: $collection_name
    output:
    - ret_psg
  retriever_search_structured:
    input:
      query_list: $query_list
      top_k: $top_k
      query_instruction: $query_instruction
      collection_name: $collection_name
      filters: $filters
      output_fields: $output_fields
    output:
    - ret_items
  bm25_index:
    input:
      overwrite: $overwrite
  bm25_search:
    input:
      query_list: $query_list
      top_k: $top_k
    output:
    - ret_psg
  bm25_search_structured:
    input:
      query_list: $query_list
      top_k: $top_k
      filters: $filters
      output_fields: $output_fields
    output:
    - ret_items
